<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EEE3"/>
      <stop offset="1" stop-color="#F2F6F5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14A38B"/>
      <stop offset="1" stop-color="#E46845"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#5a4735" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>
  <text x="80" y="88" fill="#2D2923" font-size="42" font-family="Arial, PingFang SC, sans-serif" font-weight="700">Windows 端显示示意（基于当前打包配置）</text>
  <text x="80" y="126" fill="#776B5B" font-size="22" font-family="Arial, PingFang SC, sans-serif">说明：这是示意图，不是 Windows 实机截图；当前配置使用 NSIS one-click 安装包。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" rx="28" ry="28" width="560" height="700" fill="#FFF9F1" stroke="#E7D6C3"/>
  </g>
  <circle cx="140" cy="238" r="10" fill="#F25F57"/>
  <circle cx="172" cy="238" r="10" fill="#F2C14E"/>
  <circle cx="204" cy="238" r="10" fill="#66C38F"/>
  <text x="250" y="246" fill="#4A4035" font-size="28" font-family="Arial, PingFang SC, sans-serif" font-weight="700">CodexLens 安装程序</text>
  <rect x="160" y="300" width="400" height="230" rx="26" fill="#FFFFFF" stroke="#E8DDD1"/>
  <rect x="326" y="334" width="68" height="68" rx="18" fill="url(#accent)" opacity="0.12"/>
  <rect x="336" y="344" width="48" height="48" rx="14" fill="#FFFFFF" stroke="#E8DDD1"/>
  <rect x="347" y="354" width="26" height="30" rx="9" fill="#0FA08C"/>
  <circle cx="360" cy="362" r="3.4" fill="#FFF9F1"/>
  <rect x="353" y="370" width="14" height="9" rx="4.5" fill="#FFF9F1"/>
  <path d="M355 352C355 347 359 343 364 343C369 343 373 347 373 352" stroke="#0FA08C" stroke-width="4" stroke-linecap="round"/>
  <text x="280" y="442" fill="#2D2923" font-size="34" font-family="Arial, PingFang SC, sans-serif" font-weight="700">CodexLens</text>
  <text x="220" y="478" fill="#7A6E5D" font-size="22" font-family="Arial, PingFang SC, sans-serif">正在安装，请稍候…</text>
  <rect x="190" y="520" width="340" height="14" rx="7" fill="#EFE5D8"/>
  <rect x="190" y="520" width="238" height="14" rx="7" fill="url(#accent)"/>
  <text x="160" y="610" fill="#2D2923" font-size="22" font-family="Arial, PingFang SC, sans-serif" font-weight="700">你现在在 Windows 上大概率会看到：</text>
  <text x="160" y="650" fill="#5B5046" font-size="20" font-family="Arial, PingFang SC, sans-serif">• 安装窗口标题 / 文案：CodexLens</text>
  <text x="160" y="688" fill="#5B5046" font-size="20" font-family="Arial, PingFang SC, sans-serif">• 安装包文件名：CodexLens-1.0.0-x64.exe / arm64.exe</text>
  <text x="160" y="726" fill="#5B5046" font-size="20" font-family="Arial, PingFang SC, sans-serif">• 不会出现 macOS“关于”面板那段版权排版</text>
  <text x="160" y="764" fill="#5B5046" font-size="20" font-family="Arial, PingFang SC, sans-serif">• 如果没有签名，首次运行可能会被 SmartScreen 提醒</text>

  <g filter="url(#shadow)">
    <rect x="720" y="180" rx="28" ry="28" width="600" height="430" fill="#FFF9F1" stroke="#E7D6C3"/>
  </g>
  <text x="760" y="242" fill="#2D2923" font-size="30" font-family="Arial, PingFang SC, sans-serif" font-weight="700">应用运行后的常见显示位置</text>
  <rect x="760" y="286" width="520" height="84" rx="18" fill="#FFFFFF" stroke="#E8DDD1"/>
  <text x="790" y="332" fill="#2D2923" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700">窗口标题</text>
  <text x="1110" y="332" fill="#6D6153" font-size="24" font-family="Arial, PingFang SC, sans-serif">CodexLens</text>
  <rect x="760" y="390" width="520" height="84" rx="18" fill="#FFFFFF" stroke="#E8DDD1"/>
  <text x="790" y="436" fill="#2D2923" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700">开始菜单 / 快捷方式</text>
  <text x="1060" y="436" fill="#6D6153" font-size="24" font-family="Arial, PingFang SC, sans-serif">CodexLens</text>
  <rect x="760" y="494" width="520" height="84" rx="18" fill="#FFFFFF" stroke="#E8DDD1"/>
  <text x="790" y="540" fill="#2D2923" font-size="24" font-family="Arial, PingFang SC, sans-serif" font-weight="700">设置 → 应用</text>
  <text x="1030" y="540" fill="#6D6153" font-size="24" font-family="Arial, PingFang SC, sans-serif">CodexLens 1.0.0</text>

  <g filter="url(#shadow)">
    <rect x="720" y="650" rx="28" ry="28" width="600" height="230" fill="#FFF9F1" stroke="#E7D6C3"/>
  </g>
  <text x="760" y="712" fill="#2D2923" font-size="30" font-family="Arial, PingFang SC, sans-serif" font-weight="700">和 macOS 的区别</text>
  <text x="760" y="760" fill="#5B5046" font-size="22" font-family="Arial, PingFang SC, sans-serif">Windows 没有和 macOS 完全一样的“关于本应用”系统面板。</text>
  <text x="760" y="800" fill="#5B5046" font-size="22" font-family="Arial, PingFang SC, sans-serif">你刚才删掉的那两行文案，主要只影响 macOS About 面板。</text>
  <text x="760" y="840" fill="#5B5046" font-size="22" font-family="Arial, PingFang SC, sans-serif">如果你也想让 Windows 里看到统一的版权/协议，需要做应用内“关于”弹窗。</text>
</svg>
